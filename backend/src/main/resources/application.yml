spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/helpdesk}
    username: ${DB_USERNAME:helpdesk}
    password: ${DB_PASSWORD:helpdesk}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: ${FLYWAY_LOCATIONS:classpath:db/migration}
  jackson:
    default-property-inclusion: non_null
server:
  port: ${SERVER_PORT:8081}
app:
  jwt:
    secret: ${JWT_SECRET:9zM6R0pR3tY7uW1xC5vB8nK2qF4hJ6sL9dA0gE3iT7oP1mN5}
    expiration-ms: ${JWT_EXPIRATION_MS:28800000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGIN:http://localhost:*,http://127.0.0.1:*}
springdoc:
  swagger-ui:
    path: /swagger-ui.html
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
