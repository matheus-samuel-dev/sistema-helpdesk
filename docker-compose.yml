services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: helpdesk
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: helpdesk
    ports:
      - "5434:5432"
    volumes:
      - helpdesk_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpdesk -d helpdesk"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/helpdesk
      DB_USERNAME: helpdesk
      DB_PASSWORD: helpdesk
      JWT_SECRET: ${JWT_SECRET:-9zM6R0pR3tY7uW1xC5vB8nK2qF4hJ6sL9dA0gE3iT7oP1mN5}
      CORS_ALLOWED_ORIGIN: http://localhost:5174
      FLYWAY_LOCATIONS: classpath:db/migration,classpath:db/demo
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 420s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8081/api
    ports:
      - "5174:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  helpdesk_data:
